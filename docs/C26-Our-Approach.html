  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 swap;\n  src: url(\"dbb9253e-ea75-424e-be23-97d89da06f8b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; padding: 0; background: #fff; }\n  * { box-sizing: border-box; }\n  .wrap { max-width: 1200px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }\n  @media (max-width: 860px) {\n    .grid-2 { grid-template-columns: 1fr !important; }\n    .grid-4 { grid-template-columns: repeat(2, 1fr) !important; }\n    .cta-row { flex-direction: column; align-items: flex-start !important; }\n  }\n  @media (max-width: 560px) {\n    .grid-4 { grid-template-columns: 1fr !important; }\n  }\n  <template id=\"__bundler_thumbnail\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><rect width=\"100\" height=\"100\" fill=\"#183e53\"/><text x=\"50\" y=\"44\" font-family=\"Arial\" font-weight=\"bold\" font-size=\"30\" fill=\"#3ec9c0\" text-anchor=\"middle\">C26<\u002Ftext><text x=\"50\" y=\"66\" font-family=\"Arial\" font-weight=\"bold\" font-size=\"11\" fill=\"#f38f1f\" text-anchor=\"middle\">APPROACH<\u002Ftext><\u002Fsvg><\u002Ftemplate>\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Barlow',system-ui,sans-serif;background:#fff;\">\n\n  <!-- hero -->\n  <div style=\"background:linear-gradient(180deg,#f6f9fa 0%,#eaf0f3 100%);padding:80px 0 72px;\">\n    <div class=\"wrap\">\n      <p style=\"margin:0 0 12px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">Our Approach<\u002Fp>\n      <h1 style=\"margin:0;font-family:'Barlow Condensed';font-weight:800;text-transform:uppercase;font-size:clamp(48px,8vw,84px);line-height:.9;letter-spacing:-.02em;color:#183e53;\">Our <span style=\"color:#f38f1f;\">approach<\u002Fspan><\u002Fh1>\n      <p style=\"margin:22px 0 0;max-width:560px;font-size:20px;line-height:1.5;color:#2c3f49;\">Great swimmers are developed through purpose, patience, and consistency — not endless laps and accumulated yardage.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- method intro + principles -->\n  <div style=\"padding:88px 0;\">\n    <div class=\"wrap\">\n      <p style=\"margin:0 0 8px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">The C26 method<\u002Fp>\n      <h2 style=\"margin:0 0 18px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(30px,4vw,44px);line-height:1.02;letter-spacing:-.02em;color:#183e53;\">Train with purpose<\u002Fh2>\n      <p style=\"margin:0 0 56px;max-width:680px;font-size:18px;line-height:1.6;color:#2c3f49;\">Every practice has a purpose. Every set has an objective. Every season has a plan. Our whole philosophy comes down to four commitments we make to every swimmer.<\u002Fp>\n\n      <div class=\"grid-2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:44px 56px;\">\n        <div style=\"display:flex;gap:22px;\">\n          <span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;line-height:.8;color:#3ec9c0;flex:none;\">01<\u002Fspan>\n          <div>\n            <h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#183e53;\">Train with purpose<\u002Fh3>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">We prioritize quality over quantity — technique, efficiency, and movement patterns. The goal isn't to out-yard everyone else; it's to maximize every yard we swim.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:22px;\">\n          <span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;line-height:.8;color:#3ec9c0;flex:none;\">02<\u002Fspan>\n          <div>\n            <h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#183e53;\">Develop for the long term<\u002Fh3>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">Science-backed periodization lets swimmers grow progressively. Rather than chasing early wins at 11, 12, or 13, we build toward full potential at 16–18 and the collegiate level.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:22px;\">\n          <span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;line-height:.8;color:#f38f1f;flex:none;\">03<\u002Fspan>\n          <div>\n            <h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#183e53;\">Peak when it matters most<\u002Fh3>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">We balance training stress, recovery, strength, and mobility so athletes perform at their best when it counts — while reducing the risk of burnout and overuse injury.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:22px;\">\n          <span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;line-height:.8;color:#f38f1f;flex:none;\">04<\u002Fspan>\n          <div>\n            <h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#183e53;\">Love the process<\u002Fh3>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">Success isn't only times on a scoreboard. It's confidence, resilience, discipline, and friendships — healthy young people who love the sport for life.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- pullquote -->\n  <div style=\"background:#0b1f2b;padding:72px 0;\">\n    <div class=\"wrap\">\n      <p style=\"margin:0;max-width:900px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(26px,3.6vw,42px);line-height:1.1;letter-spacing:-.02em;color:#fff;text-wrap:balance;\">Train with purpose. Develop for the long term. <span style=\"color:#3ec9c0;\">Peak when it matters most.<\u002Fspan> Love the process.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- difference matrix -->\n  <div style=\"padding:88px 0;\">\n    <div class=\"wrap\">\n      <p style=\"margin:0 0 8px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">Why C26<\u002Fp>\n      <h2 style=\"margin:0 0 32px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(30px,4vw,44px);line-height:1.02;letter-spacing:-.02em;color:#183e53;\">The C26 difference<\u002Fh2>\n      <div class=\"grid-2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d7e0e5;border:1px solid #d7e0e5;border-radius:14px;overflow:hidden;\">\n        <div style=\"background:#f6f9fa;color:#5d7480;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:16px;padding:16px 22px;\">Traditional Swim Clubs<\u002Fdiv>\n        <div style=\"background:#183e53;color:#fff;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:16px;padding:16px 22px;\">C26 Aquatics<\u002Fdiv>\n        <div style=\"background:#fff;color:#5d7480;font-size:15px;line-height:1.5;padding:18px 22px;\">Multiple pool locations and changing practice sites<\u002Fdiv>\n        <div style=\"background:#eefbfa;color:#15262f;font-size:15px;line-height:1.5;padding:18px 22px;display:flex;gap:10px;\"><span style=\"color:#0c9b92;font-weight:700;\">✓<\u002Fspan><span>One home. One pool. One standard — we own our facility.<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;color:#5d7480;font-size:15px;line-height:1.5;padding:18px 22px;\">Different coaches from practice to practice<\u002Fdiv>\n        <div style=\"background:#eefbfa;color:#15262f;font-size:15px;line-height:1.5;padding:18px 22px;display:flex;gap:10px;\"><span style=\"color:#0c9b92;font-weight:700;\">✓<\u002Fspan><span>Consistent staff who know your swimmer and how they learn.<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;color:#5d7480;font-size:15px;line-height:1.5;padding:18px 22px;\">Generalized plans for large groups<\u002Fdiv>\n        <div style=\"background:#eefbfa;color:#15262f;font-size:15px;line-height:1.5;padding:18px 22px;display:flex;gap:10px;\"><span style=\"color:#0c9b92;font-weight:700;\">✓<\u002Fspan><span>Individualized development tailored to age and ability.<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;color:#5d7480;font-size:15px;line-height:1.5;padding:18px 22px;\">Swimmers wait months for move-ups<\u002Fdiv>\n        <div style=\"background:#eefbfa;color:#15262f;font-size:15px;line-height:1.5;padding:18px 22px;display:flex;gap:10px;\"><span style=\"color:#0c9b92;font-weight:700;\">✓<\u002Fspan><span>Move up when ready — no waiting for a calendar date.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:28px 0 0;font-family:'Barlow Condensed';font-weight:800;text-transform:uppercase;letter-spacing:-.02em;font-size:clamp(22px,3vw,28px);color:#183e53;\">One Home. One Pool. One Standard.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- mission / vision -->\n  <div style=\"background:#f6f9fa;padding:88px 0;\">\n    <div class=\"wrap grid-2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#f38f1f;\">Our mission<\u002Fp>\n        <p style=\"margin:0;font-family:'Barlow Condensed';font-weight:700;font-size:clamp(22px,2.4vw,27px);line-height:1.22;color:#183e53;text-wrap:balance;\">To inspire every swimmer to reach their potential through individualized training, meaningful goals, positive culture, and a commitment to personal excellence.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 12px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#f38f1f;\">Our vision<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.65;color:#2c3f49;\">We strive to create a dynamic, supportive environment where every athlete feels valued, challenged, and inspired — empowering swimmers to overcome challenges, achieve personal success, and develop confidence that extends far beyond the pool.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- core values -->\n  <div style=\"padding:88px 0;\">\n    <div class=\"wrap\">\n      <p style=\"margin:0 0 8px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">What we stand for<\u002Fp>\n      <h2 style=\"margin:0 0 32px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(30px,4vw,44px);line-height:1.02;letter-spacing:-.02em;color:#183e53;\">Our core values<\u002Fh2>\n      <div class=\"grid-4\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\">\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Individual Focus<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Individualized training and support so each athlete reaches their own goals.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Meaningful Goals<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Purpose drives progress. We set goals and pursue them with determination.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Positive Culture<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Encouragement, respect, accountability, and celebration of success.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Inspire Potential<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Every athlete has untapped potential — we help them discover and maximize it.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Overcome Challenges<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Growth comes through adversity — we embrace challenges as chances to improve.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Dynamic Excellence<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Continuous improvement through innovation, effort, and commitment.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Mentoring for Life<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">Swimming is our vehicle for confidence, character, and leadership.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d7e0e5;border-top:3px solid #11b3aa;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(11,31,43,.08);\"><h3 style=\"margin:0 0 8px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#183e53;\">Inclusive Belonging<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#2c3f49;\">A culture that feels special and personal, welcoming all backgrounds.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- home feature band -->\n  <div style=\"background:#f6f9fa;padding:88px 0;\">\n    <div class=\"wrap grid-2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;\">\n      <div style=\"width:100%;height:320px;border-radius:14px;background-image:repeating-linear-gradient(135deg,#e2eef1 0 14px,#eaf4f6 14px 28px);display:flex;align-items:center;justify-content:center;border:1px solid #d7e0e5;\">\n        <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:#5d7480;\">[ facility photo — C26 Hub pool ]<\u002Fspan>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">Our home<\u002Fp>\n        <h2 style=\"margin:0 0 16px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(26px,3vw,34px);line-height:1.04;letter-spacing:-.02em;color:#183e53;\">One facility. Everything your swimmer needs.<\u002Fh2>\n        <p style=\"margin:0 0 16px;font-size:15.5px;line-height:1.6;color:#2c3f49;\">Unlike clubs that rent and rotate pools, we own our home at the C26 Hub inside AdventHealth SportsPark at Bluhawk — a dedicated three-lane lap pool with its own entrance and parking.<\u002Fp>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">Connected to a 10,000-sq-ft performance facility for dryland, strength, and recovery — infrared saunas, cold tubs, and compression for swimmers 13+.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- open water feature band -->\n  <div style=\"padding:88px 0;\">\n    <div class=\"wrap grid-2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;border-left:4px solid #11b3aa;padding-left:32px;\">\n      <div>\n        <p style=\"margin:0 0 8px;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#0c9b92;\">Beyond the pool<\u002Fp>\n        <h2 style=\"margin:0 0 16px;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:clamp(26px,3vw,34px);line-height:1.04;letter-spacing:-.02em;color:#183e53;\">The Midwest's premier open water program<\u002Fh2>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2c3f49;\">Coach Robbie is one of the Midwest's leading open water coaches — guiding athletes from first-time races to Open Water Zones, collegiate 5K championships, professional triathlon, and the English Channel.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"width:100%;height:280px;border-radius:14px;background-image:repeating-linear-gradient(135deg,#e2eef1 0 14px,#eaf4f6 14px 28px);display:flex;align-items:center;justify-content:center;border:1px solid #d7e0e5;\">\n        <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:#5d7480;\">[ open water action photo ]<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CTA -->\n  <div style=\"background:#183e53;padding:72px 0;\">\n    <div class=\"wrap cta-row\" style=\"display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;\">\n      <h2 style=\"margin:0;font-family:'Barlow Condensed';font-weight:800;text-transform:uppercase;font-size:clamp(34px,5vw,52px);line-height:.95;letter-spacing:-.02em;color:#fff;\">Ready to <span style=\"color:#f38f1f;\">join the team<\u002Fspan>?<\u002Fh2>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n        <a href=\"/team\" style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:17px;color:#3a2202;background:#f38f1f;padding:15px 28px;border-radius:2px;text-decoration:none;\">Join the Team<\u002Fa>\n        <a href=\"/our-story\" style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:17px;color:#fff;border:2px solid rgba(255,255,255,.4);padding:13px 26px;border-radius:2px;text-decoration:none;\">Read our story<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
