document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:#2c3f49;max-width:64ch;margin:14px 0 0\">A section-by-section diff between <strong>our wireframe<\u002Fstrong> (<code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">C26 Aquatics Site v3<\u002Fcode>) and the <strong>current codebase<\u002Fstrong> (the attached Astro project). The hero has already been synced — the wire now mirrors the as-built hero. Everything below is written as instructions you can hand to your coding agents: each card names the exact file to touch and the action to take.<\u002Fp>\n<div class=\"screen-only\" style=\"font-family:'Barlow Semi Condensed';font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:#8aa0ab;margin-top:12px\">Tip · ⌘P / Ctrl-P to save this as a PDF<\u002Fdiv>\n\n<!-- ===== LEGEND ===== -->\n<div style=\"display:flex;gap:10px;flex-wrap:wrap;margin:26px 0 8px\">\n  <div style=\"flex:1;min-width:180px;background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:8px;padding:12px 14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:#0a7886\">Aligned<\u002Fdiv>\n    <div style=\"font-size:13px;line-height:1.5;color:#2c3f49;margin-top:3px\">Code already matches the wire. Verify copy, then move on.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;min-width:180px;background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:8px;padding:12px 14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:#c26a09\">Gap — build it<\u002Fdiv>\n    <div style=\"font-size:13px;line-height:1.5;color:#2c3f49;margin-top:3px\">In the wire, missing or behind in code. Clear action.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;min-width:180px;background:#fff;border:1px solid #d7e0e5;border-left:4px solid #c41e6f;border-radius:8px;padding:12px 14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:#c41e6f\">Decision needed<\u002Fdiv>\n    <div style=\"font-size:13px;line-height:1.5;color:#2c3f49;margin-top:3px\">Wire and code diverge. Pick a direction before building.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== SECTION ORDER OVERVIEW ===== -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:34px 0 0;padding-bottom:8px;border-bottom:2px solid #18bcd0\">Section order at a glance<\u002Fh2>\n<div class=\"vsgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px\">\n  <div style=\"background:#ecf6f6;border-radius:8px;padding:14px 16px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#0a7886;margin-bottom:8px\">Wireframe order<\u002Fdiv>\n    <ol style=\"margin:0;padding-left:20px;font-size:14px;line-height:1.7;color:#2c3f49\">\n      <li>Hero<\u002Fli><li>Stats band<\u002Fli><li><strong>Mission / story<\u002Fstrong><\u002Fli><li>The C26 difference<\u002Fli><li>Programs — age groups<\u002Fli><li>Coaches &amp; bios<\u002Fli><li>Testimonial<\u002Fli><li>Single location<\u002Fli><li>FAQ<\u002Fli><li>Final CTA<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n  <div style=\"background:#f6f9fa;border-radius:8px;padding:14px 16px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#5d7480;margin-bottom:8px\">Codebase order (index.astro)<\u002Fdiv>\n    <ol style=\"margin:0;padding-left:20px;font-size:14px;line-height:1.7;color:#2c3f49\">\n      <li>Hero<\u002Fli><li>StatsBand<\u002Fli><li style=\"color:#c26a09\"><em>— none —<\u002Fem><\u002Fli><li>DifferenceBand<\u002Fli><li>TracksLadder<\u002Fli><li>CoachesGrid <span style=\"color:#5d7480\">(compact)<\u002Fspan><\u002Fli><li>TestimonialsBand<\u002Fli><li>ServiceAreaBand<\u002Fli><li>FAQAccordion<\u002Fli><li>CTABand<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fdiv>\n<p style=\"font-size:14px;line-height:1.6;color:#2c3f49;margin:12px 0 0\">Three structural divergences drive most of the work: the wire's <strong>Mission/story<\u002Fstrong> band has no counterpart in code; the wire's <strong>Testimonial<\u002Fstrong> and <strong>Single location<\u002Fstrong> bands are built quite differently in code (Testimonials 3-up, plus a Service-area SEO band). Details below.<\u002Fp>\n\n<!-- ===== HERO ===== -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:38px 0 18px;padding-bottom:8px;border-bottom:2px solid #18bcd0\">Section-by-section<\u002Fh2>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">01 · Hero<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:4px 11px\">Aligned — synced<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">Hero.astro<\u002Fcode><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">pages/index.astro<\u002Fcode><\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">None. The wire was updated this round to match the as-built hero (full-bleed <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">hero-1.png<\u002Fcode>, left-weighted navy overlay, centered kraken + wordmark lockup with masked fade, magenta “stronger”, orange + magenta-outline CTAs, scroll parallax). Treat the codebase hero as the reference. Optional nit: confirm the secondary CTA points at <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">#tracks<\u002Fcode>.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== STATS ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">02 · Stats band<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:4px 11px\">Aligned — verify copy<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">StatsBand.astro<\u002Fcode><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">data/stats.ts<\u002Fcode><\u002Fdiv>\n  <div class=\"vsgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px\">\n    <div style=\"background:#ecf6f6;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#0a7886;margin-bottom:5px\">In the wire<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Navy band, 4 figures in teal: ≤4 per class · 20+ years · 365 days · 1 location.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f6f9fa;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#5d7480;margin-bottom:5px\">In the code<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Same layout, 4 stats pulled from <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">data/stats.ts<\u002Fcode>.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">Check the four entries in <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">data/stats.ts<\u002Fcode> read exactly as the wire (value + label). No layout change.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== MISSION ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\" gin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">Build a <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">MissionBand.astro<\u002Fcode> (2-col text + <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">&lt;Image&gt;<\u002Fcode>, white surface, same container + eyebrow/heading type as DifferenceBand) and insert it in <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">index.astro<\u002Fcode> between <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">&lt;StatsBand/&gt;<\u002Fcode> and <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">&lt;DifferenceBand/&gt;<\u002Fcode>. Needs a founders photo asset.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== DIFFERENCE ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">04 · The C26 difference<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:4px 11px\">Aligned<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">DifferenceBand.astro<\u002Fcode><\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">None. Paper surface, magenta “Why C26” eyebrow, three blue-left-border pillars — matches the wire one-to-one.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== TRACKS ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">05 · Programs — age groups<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:4px 11px\">Aligned — verify copy<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">TracksLadder.astro<\u002Fcode><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">data/tracks.ts<\u002Fcode><\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">None structurally — 2×2 cards, faded ordinal, blue age pill, magenta CTA all match. Just confirm the four entries in <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">d 07em;font-size:10px;color:#5d7480;margin-bottom:5px\">In the code<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Heading “Meet the coaches”, <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">compact<\u002Fcode> variant — chrome-less photo + name + role only (no bio/badges) + a “See the full coaching staff” link. Flat navy, no seam or watermark.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <ul style=\"font-size:14px;line-height:1.55;margin:0;padding-left:18px\">\n      <li><strong>Decide:<\u002Fstrong> compact homepage cards (code, keeps it short) vs full bio cards (wire). Recommendation — keep <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">compact<\u002Fcode> on home, reserve full bios for <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">/coaches<\u002Fcode>. If bios are wanted on home, pass <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">compact={false}<\u002Fcode>.<\u002Fli>\n      <li><strong>Copy:<\u002Fstrong> pick one heading — “Coaches &amp; bios” or “Meet the coaches”.<\u002Fli>\n      <li><strong>Gap:<\u002Fstrong> add the seam-hatch divider + kraken watermark (next section).<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== TESTIMONIALS ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #c41e6f;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">07 · Testimonials<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#c41e6f;background:#fbe3ef;border-radius:999px;padding:4px 11px\">Decision needed<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">TestimonialsBand.astro<\u002Fcode><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">content/testimonials/*<\u002Fcode><\u002Fdiv>\n  <div class=\"vsgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px\">\n    <div style=\"background:#ecf6f6;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#0a7886;margin-bottom:5px\">In the wire<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">One big centered pull-quote on a deep navy band — single voice, dramatic.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f6f9fa;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#5d7480;margin-bottom:5px\">In the code<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Three quote cards in a row on a paper background, teal quote marks, heading “Families who swim with us”.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">Pick the format before building. Recommendation — keep the code's <strong>3-up paper grid<\u002Fstrong> (stronger social proof, more voices); it's a deliberate upgrade over the single wire quote. If you want the wire's single-navy moment, that's a component redesign, not a tweak.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== LOCATION / SERVICE ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #c41e6f;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">08 · Location vs service area<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#c41e6f;background:#fbe3ef;border-radius:999px;padding:4px 11px\">Decision needed<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">ServiceAreaBand.astro<\u002Fcode><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">data/serviceArea.ts<\u002Fcode><\u002Fdiv>\n  <div class=\"vsgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px\">\n    <div style=\"background:#ecf6f6;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#0a7886;margin-bottom:5px\">In the wire<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">“Single location — One pool. One standard.” Paper 2-col with address, hours, and a facility/map placeholder.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f6f9fa;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#5d7480;margin-bottom:5px\">In the code<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">A navy <em>service-area<\u002Fem> band of KC-metro city chips (local SEO), heading “Proudly serving the KC metro”, link to <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">/about#service-area<\u002Fcode>.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">These solve different jobs — the code band is an SEO play (city names as crawlable text); the wire band gives address + hours. Decide what home shows: <strong>(a)<\u002Fstrong> location + hours, <strong>(b)<\u002Fstrong> service-area chips, or <strong>(c)<\u002Fstrong> both (chips here, address in the footer to avoid redundancy). If you want the wire's band, build a <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">LocationBand.astro<\u002Fcode>; keep <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">ServiceAreaBand<\u002Fcode> for SEO.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== FAQ ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">09 · FAQ<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:4px 11px\">Aligned — minor nits<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">FAQAccordion.astro<\u002Fcode><\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:14px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">Structurally aligned, and the code version is better — it emits matching FAQ <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">JSON-LD<\u002Fcode>. Two nits: align the heading (“Frequently asked” vs “Common questions”) and the toggle accent (wire magenta vs code orange chevron). Keep the code's content-collection approach.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== FINAL CTA ===== -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:10px;padding:20px 22px;margin-bottom:16px\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:21px;color:#242b6e\">10 · Final CTA<\u002Fdiv>\n    <span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:4px 11px\">Gap + copy<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin:8px 0 0;display:flex;gap:6px;flex-wrap:wrap\"><code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;color:#2c3f49;padding:2px 7px;border-radius:4px\">CTABand.astro<\u002Fcode><\u002Fdiv>\n  <div class=\"vsgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px\">\n    <div style=\"background:#ecf6f6;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#0a7886;margin-bottom:5px\">In the wire<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Navy band, “Get in the water”, one orange CTA “Book your first session”. Plus the new hatch-band lead-in and a kraken watermark.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f6f9fa;border-radius:8px;padding:12px 14px\"><div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;color:#5d7480;margin-bottom:5px\">In the code<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.5;color:#2c3f49\">Navy band, “Ready to get in the water?”, two CTAs — “Book a lesson” + “Team tryouts”. Flat navy, no seam or watermark.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:13px 15px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:5px\">Action for devs<\u002Fdiv>\n    <ul style=\"font-size:14px;line-height:1.55;margin:0;padding-left:18px\">\n      <li><strong>Copy:<\u002Fstrong> settle the headline and button labels. The code's two-CTA split (Book + Tryouts) is useful — keep it unless you want a single focused CTA.<\u002Fli>\n      <li><strong>Gap:<\u002Fstrong> add the seam-hatch divider + kraken watermark (next section).<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== BACKGROUND TREATMENTS ===== -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:40px 0 6px;padding-bottom:8px;border-bottom:2px solid #f38f1f\">Background treatments to add<\u002Fh2>\n<p style=\"font-size:15px;line-height:1.6;color:#2c3f49;margin:12px 0 0\">Two devices, applied only where a light section meets a dark one. On the homepage that's two seams: <strong>into Coaches<\u002Fstrong> (after the white Tracks) and <strong>into the final CTA<\u002Fstrong> (after the white FAQ). Rule of thumb: one divider + one texture per seam, never stacked.<\u002Fp>\n\n<!-- A: hatch -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:10px;padding:20px 22px;margin:16px 0\">\n  <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:19px;color:#242b6e\">A · Hatch-band divider<\u002Fdiv>\n  <p style=\"font-size:14px;line-height:1.55;color:#2c3f49;margin:8px 0 0\">A 44px band reusing the hero's 45° stripe, placed immediately before each dark section. Cleanest as a tiny presentational component dropped into <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 6px;border-radius:4px\">index.astro<\u002Fcode>.<\u002Fp>\n  <pre style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:14px 16px;margin:12px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6\"><span style=\"color:#9fb8c3\">/* new: components/sections/SeamHatch.astro */<\u002Fspan>\n&lt;div class=\"seam-hatch\" aria-hidden=\"true\"&gt;&lt;/div&gt;\n&lt;style&gt;\n  .seam-hatch {\n    height: 44px;\n    background: repeating-linear-gradient(\n      45deg, var(--hatch-a) 0 11px, var(--hatch-b) 11px 22px);\n  }\n&lt;/style&gt;\n\n<span style=\"color:#9fb8c3\">/* index.astro — place before each dark section */<\u002Fspan>\n&lt;SeamHatch /&gt; &lt;CoachesGrid ... /&gt;\n&lt;SeamHatch /&gt; &lt;CTABand ... /&gt;<\u002Fpre>\n<\u002Fdiv>\n\n<!-- B: watermark -->\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:10px;padding:20px 22px;margin:16px 0\">\n  <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:19px;color:#242b6e\">B · Kraken watermark<\u002Fdiv>\n  <p style=\"font-size:14px;line-height:1.55;color:#2c3f49;margin:8px 0 0\">Oversized <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 6px;border-radius:4px\">kraken-white.png<\u002Fcode> bleeding off-edge at very low opacity — the same trick the hero already uses. Add to the dark sections only (Coaches bottom-left ~.05, Final CTA right ~.06).<\u002Fp>\n  <pre style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:14px 16px;margin:12px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6\"><span style=\"color:#9fb8c3\">/* on the dark section root */<\u002Fspan>\n.coaches--dark { position: relative; overflow: hidden; }\n\n.coaches--dark::after {            <span style=\"color:#9fb8c3\">/* or an &lt;Image&gt; el */<\u002Fspan>\n  content: \"\";\n  position: absolute;\n  left: -80px; bottom: -80px;\n  width: 340px; height: 340px;\n  background: url('/kraken-white.png') center/contain no-repeat;\n  opacity: .05;\n  pointer-events: none;\n}\n<span style=\"color:#9fb8c3\">/* keep section content above it: */<\u002Fspan>\n.coaches--dark .container { position: relative; z-index: 1; }<\u002Fpre>\n  <p style=\"font-size:13px;line-height:1.55;color:#5d7480;margin:12px 0 0\">Note: the stripe navies <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">#1a2150 / #26306c<\u002Fcode> aren't in <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">tokens/colors.css<\u002Fcode> yet — add <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">--hatch-a / --hatch-b<\u002Fcode> there so the seam is themeable.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== PUNCH LIST ===== -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:40px 0 6px;padding-bottom:8px;border-bottom:2px solid #242b6e\">Punch list for the agents<\u002Fh2>\n<div style=\"border:1px solid #d7e0e5;border-radius:10px;overflow:hidden;margin-top:16px\">\n  <div style=\"display:grid;grid-template-columns:1fr;font-size:14px;line-height:1.5\">\n    <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:2px 9px\">VERIFY<\u002Fspan><span style=\"color:#2c3f49\">Stats &amp; Tracks copy match <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">data/stats.ts<\u002Fcode> · <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">data/tracks.ts<\u002Fcode><\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">BUILD<\u002Fspan><span style=\"color:#2c3f49\">New <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">MissionBand.astro<\u002Fcode>, insert after StatsBand<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c41e6f;background:#fbe3ef;border-radius:999px;padding:2px 9px\">DECIDE<\u002Fspan><span style=\"color:#2c3f49\">Coaches: compact vs full bios · align heading<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c41e6f;background:#fbe3ef;border-radius:999px;padding:2px 9px\">DECIDE<\u002Fspan><span style=\"color:#2c3f49\">Testimonials: single-navy quote vs 3-up paper grid<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c41e6f;background:#fbe3ef;border-radius:999px;padding:2px 9px\">DECIDE<\u002Fspan><span style=\"color:#2c3f49\">Location vs service-area band(s) on home<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">TWEAK<\u002Fspan><span style=\"color:#2c3f49\">FAQ heading + toggle accent · Final CTA headline + labels<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">BUILD<\u002Fspan><span style=\"color:#2c3f49\">Seam-hatch divider + kraken watermark on Coaches &amp; Final CTA · add <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">--hatch-a/b<\u002Fcode> tokens<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;padding:11px 16px;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#0a7886;background:#d6f5fa;border-radius:999px;padding:2px 9px\">DONE<\u002Fspan><span style=\"color:#2c3f49\">Hero — wire synced to as-built, no action<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<p style=\"font-size:13px;line-height:1.55;color:#5d7480;margin:26px 0 0;padding-top:14px;border-top:1px solid #d7e0e5\">Scope: homepage only, per request. Header, footer, nav mega-menu, and the intro splash were not diffed in depth here — the codebase intro (<code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">BrandIntro.astro<\u002Fcode>, kraken flies to header) is more elaborate than the wire's and can stay. Flag if you want the inner pages (lessons, about, coaches, team, FAQ) diffed next.<\u002Fp>\n\n<\u002Ftd><\u002Ftr><\u002Ftbody>\n<tfoot><tr><td class=\"ftr-space\"><\u002Ftd><\u002Ftr><\u002Ftfoot>\n<\u002Ftable>\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
