document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 { display:table-cell; height:0.55in; }\n    .card, pre, .callout { break-inside:avoid; }\n    h1,h2,h3,h4 { break-after:avoid; }\n    p,li { orphans:3; widows:3; }\n    .screen-only { display:none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<main class=\"doc\">\n<table class=\"doc-frame\" role=\"presentation\">\n<thead><tr><td class=\"hdr-space\"><\u002Ftd><\u002Ftr><\u002Fthead>\n<tbody><tr><td>\n\n<!-- MASTHEAD -->\n<div style=\"font-family:'Barlow Semi Condensed';font-weight:600;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:#0e96a8\">C26 Aquatics · Competitive Team<\u002Fdiv>\n<h1 style=\"font-family:'Barlow Condensed';font-weight:800;text-transform:uppercase;font-size:44px;line-height:.95;letter-spacing:-.02em;color:#242b6e;margin:8px 0 0\">Team page — build spec<\u002Fh1>\n<p style=\"font-size:16px;line-height:1.6;color:#2c3f49;max-width:66ch;margin:14px 0 0\">Everything your coding agents need to ship the <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">/team<\u002Fcode> page from the 7-group source data: the schema change, all seven content entries (copy-paste ready), and the page edits. The visual target is the wire <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">C26 Team Page<\u002Fcode>.<\u002Fp>\n<div class=\"screen-only\" style=\"font-family:'Barlow Semi Condensed';font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:#8aa0ab;margin-top:12px\">Tip · ⌘P / Ctrl-P to save as a PDF<\u002Fdiv>\n\n<!-- 1. SCHEMA -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:34px 0 0;padding-bottom:8px;border-bottom:2px solid #f38f1f\">1 · Schema change<\u002Fh2>\n<p style=\"font-size:15px;line-height:1.6;color:#2c3f49;margin:12px 0 0\">In <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">src/content/config.ts<\u002Fcode>, replace the <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">trainingGroups<\u002Fcode> schema. The flat <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">schedule<\u002Fcode> string becomes a structured <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">scheduleOptions<\u002Fcode> array (to support the two-option groups), and the spec fields are added.<\u002Fp>\n<pre style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:16px 18px;margin:12px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6\">const trainingGroups = defineCollection({\n  type: 'content',\n  schema: z.object({\n    name: z.string(),\n    ageRange: z.string(),                <span style=\"color:#9fb8c3\">// \"5–8 yrs\"<\u002Fspan>\n    groupSize: z.number(),\n    suggestedPractices: z.string(),      <span style=\"color:#9fb8c3\">// \"2×/week\", \"2–3×/week\"<\u002Fspan>\n    monthlyHours: z.number(),            <span style=\"color:#9fb8c3\">// avg hrs / month<\u002Fspan>\n    monthlyCost: z.number(),             <span style=\"color:#9fb8c3\">// USD<\u002Fspan>\n    costPerHour: z.number(),             <span style=\"color:#9fb8c3\">// USD, stored for display<\u002Fspan>\n    commitmentLevel: z.enum(['developmental','competitive','elite']),\n    scheduleOptions: z.array(z.object({\n      label: z.string().optional(),      <span style=\"color:#9fb8c3\">// \"Option 1\" when &gt;1 option<\u002Fspan>\n      slots: z.array(z.object({\n        day: z.string(), time: z.string(),\n      })),\n    })).min(1),\n    prerequisites: z.array(z.string()).default([]),\n    order: z.number(),\n  }),\n});<\u002Fpre>\n\n<!-- 2. CONTENT -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:38px 0 0;padding-bottom:8px;border-bottom:2px solid #f38f1f\">2 · Content entries<\u002Fh2>\n<p style=\"font-size:15px;line-height:1.6;color:#2c3f49;margin:12px 0 16px\"><strong>Delete<\u002Fstrong> the four placeholders (<code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">bronze/silver/gold/platinum.md<\u002Fcode>) and add these seven in <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#eef3f5;padding:1px 6px;border-radius:4px\">src/content/training-groups/<\u002Fcode>. Each block is the full file — frontmatter + body.<\u002Fp>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">pre-competitive.md <span style=\"font-size:12px;color:#0a7886\">· developmental<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Pre-Competitive\"\nageRange: \"5–8 yrs\"\ngroupSize: 30\nsuggestedPractices: \"2×/week\"\nmonthlyHours: 11\nmonthlyCost: 170\ncostPerHour: 18.57\ncommitmentLevel: \"developmental\"\norder: 1\nscheduleOptions:\n  - slots:\n      - { day: \"Tue\", time: \"5:00–5:45 PM\" }\n      - { day: \"Thu\", time: \"5:00–5:45 PM\" }\n      - { day: \"Sat\", time: \"1:30–2:30 PM\" }\n---\nIntroduces young swimmers to the foundation skills for future\ncompetitive swimming in a fun, supportive, confidence-building\nenvironment. The focus isn't racing — it's strong technical\nhabits, water comfort, and a love for the sport.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #18bcd0;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">novice-age-group.md <span style=\"font-size:12px;color:#0a7886\">· developmental · two schedule options<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Novice Age Group\"\nageRange: \"7–12 yrs\"\ngroupSize: 30\nsuggestedPractices: \"2×/week\"\nmonthlyHours: 12.75\nmonthlyCost: 200\ncostPerHour: 15.68\ncommitmentLevel: \"developmental\"\norder: 2\nscheduleOptions:\n  - label: \"Option 1\"\n    slots:\n      - { day: \"Mon\", time: \"4:45–6:15 PM\" }\n      - { day: \"Wed\", time: \"4:45–6:15 PM\" }\n      - { day: \"Fri\", time: \"6:00–7:15 PM\" }\n      - { day: \"Sat\", time: \"2:30–3:30 PM\" }\n  - label: \"Option 2\"\n    slots:\n      - { day: \"Tue\", time: \"5:15–6:45 PM\" }\n      - { day: \"Thu\", time: \"5:15–6:45 PM\" }\n      - { day: \"Fri\", time: \"7:00–8:15 PM\" }\n      - { day: \"Sat\", time: \"3:30–4:30 PM\" }\n---\nThe first stage of structured competitive training — swimmers move\nfrom basic skills to a fuller grasp of all four strokes, learn\ntraining vocabulary, and meet the core elements of racing. Emphasis\non individual improvement, friendships, and a fun, energetic\natmosphere.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #2f63ef;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">advanced-age-group.md <span style=\"font-size:12px;color:#2f63ef\">· competitive · two schedule options<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Advanced Age Group\"\nageRange: \"9–14 yrs\"\ngroupSize: 30\nsuggestedPractices: \"2–3×/week\"\nmonthlyHours: 15.5\nmonthlyCost: 220\ncostPerHour: 14.19\ncommitmentLevel: \"competitive\"\norder: 3\nscheduleOptions:\n  - label: \"Option 1\"\n    slots:\n      - { day: \"Mon\", time: \"4:45–6:15 PM\" }\n      - { day: \"Wed\", time: \"4:45–6:15 PM\" }\n      - { day: \"Fri\", time: \"6:00–7:15 PM\" }\n      - { day: \"Sat\", time: \"2:30–3:30 PM\" }\n  - label: \"Option 2\"\n    slots:\n      - { day: \"Tue\", time: \"5:15–6:45 PM\" }\n      - { day: \"Thu\", time: \"5:15–6:45 PM\" }\n      - { day: \"Fri\", time: \"7:00–8:15 PM\" }\n      - { day: \"Sat\", time: \"3:30–4:30 PM\" }\n---\nFor swimmers with strong fundamentals ready for more refined\ntechnique, diverse training through the individual medley, and\nintentional performance development. Racing skills move front and\ncenter, with each swimmer building a practice plan around their\ngoals. Fun, fitness, and team-building are core.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #2f63ef;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">junior-olympic.md <span style=\"font-size:12px;color:#2f63ef\">· competitive<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Junior Olympic\"\nageRange: \"9–14 yrs\"\ngroupSize: 27\nsuggestedPractices: \"2–5×/week\"\nmonthlyHours: 25\nmonthlyCost: 250\ncostPerHour: 10.00\ncommitmentLevel: \"competitive\"\norder: 4\nscheduleOptions:\n  - slots:\n      - { day: \"Mon\", time: \"5:45–7:00 PM\" }\n      - { day: \"Tue\", time: \"6:15–8:00 PM\" }\n      - { day: \"Wed\", time: \"5:45–7:00 PM\" }\n      - { day: \"Thu\", time: \"6:15–8:00 PM\" }\n      - { day: \"Fri\", time: \"5:00–6:45 PM\" }\n---\nA critical transition between advanced age-group swimming and\nhigher-level performance. Built for athletes ready to focus on\nstructured goal-setting, time standards, and advancement into\ntougher competition — shifting toward performance ownership and\nlong-term development while keeping the sport fun.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #2f63ef;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">pre-senior.md <span style=\"font-size:12px;color:#2f63ef\">· competitive<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Pre-Senior\"\nageRange: \"11–14 yrs\"\ngroupSize: 27\nsuggestedPractices: \"4–6×/week\"\nmonthlyHours: 40.75\nmonthlyCost: 280\ncostPerHour: 6.87\ncommitmentLevel: \"competitive\"\norder: 5\nscheduleOptions:\n  - slots:\n      - { day: \"Mon\", time: \"7:00–8:30 PM\" }\n      - { day: \"Tue\", time: \"3:30–5:45 PM\" }\n      - { day: \"Wed\", time: \"7:00–8:30 PM\" }\n      - { day: \"Thu\", time: \"3:30–5:45 PM\" }\n      - { day: \"Fri\", time: \"3:30–5:45 PM\" }\n      - { day: \"Sat\", time: \"6:00–8:00 AM\" }\n---\nThe blueprint to higher-level senior performance. Swimmers define a\nlong-term direction in the sport while building the habits, mindset,\nand standards advanced competition demands — with individual training\nfocus and preparation for District, State, Zone, and Sectional meets.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #2f63ef;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">high-school-prep.md <span style=\"font-size:12px;color:#2f63ef\">· competitive<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"High School Prep\"\nageRange: \"14–18 yrs\"\ngroupSize: 27\nsuggestedPractices: \"3–6×/week\"\nmonthlyHours: 40.75\nmonthlyCost: 280\ncostPerHour: 6.87\ncommitmentLevel: \"competitive\"\norder: 6\nscheduleOptions:\n  - slots:\n      - { day: \"Mon\", time: \"3:30–5:30 PM\" }\n      - { day: \"Tue\", time: \"5:15–6:45 AM\" }\n      - { day: \"Wed\", time: \"3:30–5:30 PM\" }\n      - { day: \"Thu\", time: \"5:15–6:45 AM\" }\n      - { day: \"Fri\", time: \"3:30–5:45 PM\" }\n      - { day: \"Sat\", time: \"6:00–8:00 AM\" }\n---\nFor swimmers who want to keep improving while balancing school,\nother activities, and life. The focus is purposeful training,\nefficient use of pool time, and individual goal-setting — pursuing\nexcellence in the water while staying balanced with academics and\neverything else.<\u002Fpre>\n<\u002Fdiv>\n\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #c41e6f;border-radius:10px;padding:16px 18px;margin-bottom:14px\">\n<div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">senior-elite.md <span style=\"font-size:12px;color:#c41e6f\">· elite<\u002Fspan><\u002Fdiv>\n<pre style=\"background:#f6f9fa;color:#15262f;border:1px solid #e4ecef;border-radius:8px;padding:13px 15px;margin:10px 0 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55\">---\nname: \"Senior Elite\"\nageRange: \"13–18 yrs\"\ngroupSize: 15\nsuggestedPractices: \"6–8×/week\"\nmonthlyHours: 59\nmonthlyCost: 325\ncostPerHour: 5.50\ncommitmentLevel: \"elite\"\norder: 7\nscheduleOptions:\n  - slots:\n      - { day: \"Mon\", time: \"3:30–5:30 PM\" }\n      - { day: \"Tue\", time: \"5:15–6:45 AM\" }\n      - { day: \"Tue\", time: \"3:30–5:45 PM\" }\n      - { day: \"Wed\", time: \"3:30–5:30 PM\" }\n      - { day: \"Thu\", time: \"5:15–6:45 AM\" }\n      - { day: \"Thu\", time: \"3:30–5:45 PM\" }\n      - { day: \"Fri\", time: \"3:30–5:45 PM\" }\n      - { day: \"Sat\", time: \"6:00–8:00 AM\" }\n---\nThe pinnacle of the development pathway — for swimmers committed to\nexcellence in and out of the pool who aim to compete at the highest\nlevels and pursue collegiate swimming. Athletes answer two questions\n— \"Where am I now, and where do I want to go?\" — to shape\nindividualized training plans and long-term goals.<\u002Fpre>\n<\u002Fdiv>\n\n<!-- 3. PAGE -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:38px 0 0;padding-bottom:8px;border-bottom:2px solid #f38f1f\">3 · Page &amp; component edits<\u002Fh2>\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #f38f1f;border-radius:10px;padding:18px 20px;margin:14px 0\">\n  <div style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:18px;color:#242b6e\">src/pages/team.astro<\u002Fdiv>\n  <ul style=\"font-size:14.5px;line-height:1.6;color:#2c3f49;margin:8px 0 0;padding-left:18px\">\n    <li>Map the new fields into the <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">TrackTabs<\u002Fcode> meta: Ages, Group size, Practices, Hrs/mo, Monthly, <strong>Per hour<\u002Fstrong>, plus the schedule (render <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">scheduleOptions<\u002Fcode> with an Option 1 / Option 2 toggle when <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">length &gt; 1<\u002Fcode>).<\u002Fli>\n    <li>Add a <strong>compare table<\u002Fstrong> below TrackTabs — columns Group / Ages / Size / Practices / Hrs&nbsp;mo / Monthly / Per&nbsp;hour, sorted by <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">order<\u002Fcode>, with the Per-hour column tinted and a level dot per row. (Markup &amp; behavior shown in the wire.)<\u002Fli>\n    <li>Fix stale counts: hero subtitle <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">\"Bronze through Platinum\"<\u002Fcode> → <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">\"Pre-Competitive through Senior Elite\"<\u002Fcode>; TrackTabs subtitle <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">\"Four groups\"<\u002Fcode> → <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">\"Seven groups\"<\u002Fcode>; philosophy stat <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">value=\"4\"<\u002Fcode> → <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">\"7\"<\u002Fcode>.<\u002Fli>\n  <\u002Ful>\n  <div class=\"callout\" style=\"background:#0e1330;color:#eaf3f6;border-radius:8px;padding:12px 14px;margin-top:12px\">\n    <div style=\"font-family:'Barlow Semi Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#2fd0e0;margin-bottom:4px\">Also<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.55\">The homepage “Competitive” track card (<code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">TracksLadder<\u002Fcode>) should deep-link here; keep the detailed ladder on <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd9a8\">/team<\u002Fcode>, not on home.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 4. DATA FLAGS -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:38px 0 0;padding-bottom:8px;border-bottom:2px solid #c41e6f\">4 · Confirm with the client<\u002Fh2>\n<div class=\"card\" style=\"background:#fff;border:1px solid #d7e0e5;border-left:4px solid #c41e6f;border-radius:10px;padding:16px 20px;margin-top:14px\">\n  <ul style=\"font-size:14.5px;line-height:1.65;color:#2c3f49;margin:0;padding-left:18px\">\n    <li><strong>High School Prep hours<\u002Fstrong> were listed as <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">40.76<\u002Fcode> — normalized to <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">40.75<\u002Fcode> (matches Pre-Senior; likely a typo). Confirm.<\u002Fli>\n    <li><strong>AM practices:<\u002Fstrong> Pre-Senior, HS Prep, and Senior Elite list early-morning slots (e.g. <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">5:15–6:45 AM<\u002Fcode>, <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px;background:#eef3f5;padding:1px 5px;border-radius:4px\">6:00–8:00 AM<\u002Fcode>). Verify those are intended AM, not PM.<\u002Fli>\n    <li><strong>Age overlaps<\u002Fstrong> are intentional but worth a note: Junior Olympic &amp; Advanced both 9–14; Pre-Senior 11–14 &amp; HS Prep 14–18. Placement is by coach evaluation, so overlaps are fine — just confirm the displayed ranges.<\u002Fli>\n    <li><strong>Pre-Competitive<\u002Fstrong> is developmental (not USA-Swimming competitive). Decide whether it lives under Team or alongside Lessons in the IA.<\u002Fli>\n  <\u002Ful>\n<\u002Fdiv>\n\n<!-- PUNCH LIST -->\n<h2 style=\"font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:24px;letter-spacing:-.01em;color:#242b6e;margin:38px 0 0;padding-bottom:8px;border-bottom:2px solid #242b6e\">Punch list<\u002Fh2>\n<div style=\"border:1px solid #d7e0e5;border-radius:10px;overflow:hidden;margin-top:14px;font-size:14px;line-height:1.5\">\n  <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">1<\u002Fspan><span style=\"color:#2c3f49\">Update <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">trainingGroups<\u002Fcode> schema in <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">config.ts<\u002Fcode><\u002Fspan><\u002Fdiv>\n  <div style=\"display:flex;gap:12px;padding:11px 16px;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">2<\u002Fspan><span style=\"color:#2c3f49\">Delete 4 placeholders, add the 7 entries above<\u002Fspan><\u002Fdiv>\n  <div style=\"display:flex;gap:12px;padding:11px 16px;background:#f6f9fa;align-items:center\"><span style=\"flex:none;font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;color:#c26a09;background:#fff0db;border-radius:999px;padding:2px 9px\">3
